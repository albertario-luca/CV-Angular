<div class="container py-5">

    <h2 class="fw-bold mb-4">Progetti</h2>

    <div class="row g-4">

        <div class="col-md-4" *ngFor="let project of projects">

            <div class="card h-100 shadow-sm">

                <div class="card-body d-flex flex-column">

                    <h5 class="card-title">{{ project.title }}</h5>

                    <p class="card-text text-muted">
                        {{ project.description }}
                    </p>

                    <div class="mb-3">
                        <span *ngFor="let t of project.tech" class="badge bg-secondary me-1">
                            {{ t }}
                        </span>
                    </div>

                    <a *ngIf="project.link" [href]="project.link" target="_blank" class="btn btn-outline-dark mt-auto">
                        Vedi progetto
                    </a>

                </div>

            </div>

        </div>

    </div>
</div>
