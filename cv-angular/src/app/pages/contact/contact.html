<div class="container py-5" style="max-width: 600px;">

    <h2 class="fw-bold mb-4">Contattami</h2>

    <form (ngSubmit)="submit()" #contactForm="ngForm">

        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" name="name" [(ngModel)]="form.name" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" [(ngModel)]="form.email" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Messaggio</label>
            <textarea class="form-control" rows="4" name="message" [(ngModel)]="form.message" required></textarea>
        </div>

        <button class="btn btn-dark w-100" [disabled]="contactForm.invalid">
            Invia
        </button>

    </form>
</div>
