<div class="container py-5" style="max-width: 600px;">
    <h2 class="fw-bold mb-4">Contattami</h2>

    <form action="https://formspree.io/f/mrearkqg" method="POST">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required placeholder="la tua email" />
        </div>

        <div class="mb-3">
            <label class="form-label">Messaggio</label>
            <textarea name="message" class="form-control" rows="5" required
                placeholder="Scrivi qui il tuo messaggio..."></textarea>
        </div>

        <button type="submit" class="btn btn-dark w-100">Invia</button>
    </form>
</div>
